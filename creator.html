<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>LLOOP · ถ่ายได้เครดิต</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--canvas:#FAF8F5;--surface:#FFF;--ink:#1C1B19;--stone:#6E6A63;--hairline:#E7E2DA;
    --navy:#1A1A1A;--sage:#6FB3A6;--sage-bg:#E4F0EC;--champagne:#C9A86A;--ok:#0F6E56;--danger:#A32D2D;
    --serif:'Poppins','Prompt',sans-serif;--sans:'Inter','Prompt',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6}
  .wrap{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:40px}
  header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--hairline)}
  .hl{display:flex;align-items:center;gap:10px}
  .hback{background:none;border:1px solid var(--hairline);border-radius:50%;width:32px;height:32px;font-size:20px;
    line-height:1;color:var(--ink);cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;padding-bottom:3px}
  .brand{font-family:var(--serif);font-size:22px;font-weight:600}
  .brand small{font-family:var(--sans);font-size:11px;letter-spacing:2px;color:var(--champagne);display:block}
  .credit{font-size:12px;color:var(--stone);text-align:right}
  .credit b{display:block;color:var(--ink);font-size:15px}
  .tag{text-align:center;font-size:11px;letter-spacing:2px;color:var(--champagne);padding:10px 18px 0}
  .sec{font-size:11px;letter-spacing:1.5px;color:var(--stone);text-transform:uppercase;margin:18px 18px 10px}
  .gig{background:var(--surface);border:1px solid var(--hairline);border-radius:6px;margin:0 18px 12px;overflow:hidden;display:flex}
  .gig .ph{width:96px;flex:none;background:#EFE7DC center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;color:rgba(0,0,0,.28);font-size:11px;text-align:center;padding:6px}
  .gig .body{padding:12px 14px;flex:1}
  .gig .name{font-family:var(--serif);font-size:16px}
  .gig .meta{font-size:12px;color:var(--stone);margin:2px 0 8px}
  .reward{display:inline-block;font-size:12px;background:var(--sage-bg);color:#0c3a33;padding:3px 10px;border-radius:20px}
  .st{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:#F0EDE7;color:var(--stone)}
  .st.approved{background:var(--sage-bg);color:var(--ok)} .st.submitted{background:#FBF3DD;color:#8a6d12}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:3px;padding:9px 16px;font-family:var(--sans);font-size:13px;cursor:pointer;margin-top:10px}
  .btn:disabled{opacity:.5}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
  .upload{margin:0 18px;background:var(--surface);border:1px dashed var(--champagne);border-radius:8px;padding:22px;text-align:center}
  .upload p{font-size:13px;color:var(--stone);margin:8px 0}
  #prev{max-width:100%;border-radius:6px;margin:10px 0;display:none}
  .audit{margin:12px 18px 0;background:var(--surface);border:1px solid var(--hairline);border-radius:8px;padding:14px 16px}
  .audit h4{font-family:var(--serif);font-size:17px;font-weight:500;margin-bottom:6px}
  .checkrow{display:flex;align-items:center;gap:8px;font-size:13px;padding:3px 0}
  .ok{color:var(--ok)} .bad{color:var(--danger)}
  .note{margin:14px 18px;background:#FBF3DD;border-radius:8px;padding:12px 14px;font-size:13px;color:#7a610f}
  .back{font-size:13px;color:var(--stone);background:none;border:none;cursor:pointer;padding:14px 18px 0}
  .empty{margin:18px;color:var(--stone);font-size:14px;text-align:center}
  .err{margin:14px 18px;background:#F7E7E7;color:var(--danger);border-radius:8px;padding:12px 14px;font-size:13px}
  .note a{color:#7a610f;text-decoration:underline}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);max-width:380px;width:88%;
    background:#2A2724;color:#fff;border-radius:8px;padding:11px 15px;font-size:13px;opacity:0;pointer-events:none;
    transition:.25s;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.25);text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header class="lloop-topbar" data-back="index.html" data-back-th="หน้าหลัก" data-back-en="Home"></header>
<div class="wrap">
  <div class="credit" style="text-align:right;padding:12px 18px 0"><span data-i18n="Wallet credit">เครดิตในกระเป๋า</span><b id="credit">฿–</b></div>
  <div class="tag" data-i18n="Shoot beautiful looks, earn credit toward your next rental">ถ่ายชุดสวย ๆ ได้เครดิตไว้เช่าครั้งหน้า</div>
  <div id="view"><div class="empty" data-i18n="Loading…">กำลังโหลด…</div></div>
</div>
<div id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="me-api.js"></script>
<script src="nav.js?v=1"></script>
<script>
const $ = s => document.querySelector(s);
const FN = CONFIG.SUPABASE_URL + '/functions/v1';
const sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
let BOARD = null, pickedFile = null;

const ERR = () => ({ need_rental:NAV.t('เช่าชุดครั้งแรกก่อน แล้วเริ่มรับงานถ่ายได้เลย','Rent your first outfit, then you can start taking photo gigs'),
  too_many_active:NAV.t('ยังมีงานค้างอยู่ — ส่งงานเดิมให้เสร็จก่อนนะคะ','You still have an open gig — please finish it first'),
  already_taken:NAV.t('งานนี้มีคนรับไปแล้ว ลองงานอื่นดูค่ะ','This gig has been taken — try another one'), blocked:NAV.t('บัญชีนี้ถูกพักการรับงานชั่วคราว','This account is temporarily paused from taking gigs'),
  gig_not_found:NAV.t('ไม่พบงานนี้แล้ว','This gig is no longer available'), no_customer:NAV.t('ยังไม่พบบัญชีของคุณ','We could not find your account') });
const msg = e => ERR()[e] || e || NAV.t('เกิดข้อผิดพลาด','Something went wrong');
let _tt; function toast(t){ const el=$('#toast'); el.textContent=t; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2800); }

async function load(){
  const { data, error } = await window.meRpc('gig_board', {});
  if (error) { $('#view').innerHTML = `<div class="err">${error.message}</div>`; return; }
  BOARD = data; render();
}

function render(){
  $('#credit').textContent = '฿' + Math.round(BOARD.wallet_balance || 0);
  const openGigs = BOARD.open || [], mine = BOARD.mine || [];
  let html = '';
  if (!BOARD.can_claim) html += `<div class="note">${msg(BOARD.reason)} <a href="index.html">${NAV.t('ไปเลือกชุด','Browse outfits')}</a></div>`;
  html += `<div class="sec">${NAV.t('งานถ่ายที่เปิดรับ','Open photo gigs')}</div>`;
  html += openGigs.length ? openGigs.map(g => `
    <div class="gig">
      <div class="ph" style="${g.photo?`background-image:url('${g.photo}')`:''}">${g.photo?'':g.name||g.garment}</div>
      <div class="body">
        <div class="name">${g.name || g.garment}</div>
        <div class="meta">${NAV.t('ต้องการรูปหุ่นไซส์','On-body photo wanted, size')} ${g.needed_size || '-'}</div>
        <span class="reward">${NAV.t('ได้เครดิต','Earn')} ฿${g.reward}</span><br>
        <button class="btn" ${BOARD.can_claim?'':'disabled'} onclick="claim('${g.gig_id}','${(g.name||g.garment||'').replace(/'/g,'')}')">${NAV.t('รับงานนี้','Take this gig')}</button>
      </div>
    </div>`).join('') : `<div class="empty">${NAV.t('ยังไม่มีงานเปิดรับตอนนี้ — แวะมาใหม่นะคะ','No open gigs right now — check back soon')}</div>`;
  if (mine.length){
    html += `<div class="sec">${NAV.t('งานของฉัน','My gigs')}</div>`;
    const lbl = {reserved:NAV.t('รอส่งรูป','Awaiting photo'),submitted:NAV.t('กำลังตรวจ','In review'),approved:NAV.t('ผ่าน + ได้เครดิตแล้ว','Approved + credited'),rejected:NAV.t('ไม่ผ่าน','Not approved'),open:'-'};
    html += mine.map(g => `
      <div class="gig"><div class="body">
        <div class="name">${g.name || g.garment}</div>
        <div class="meta">฿${g.reward}</div>
        <span class="st ${g.status}">${lbl[g.status]||g.status}</span>
        ${g.status==='reserved'?`<br><button class="btn ghost" onclick="claim('${g.gig_id}','${(g.name||g.garment||'').replace(/'/g,'')}')" style="margin-top:8px">${NAV.t('ส่งรูป','Submit photo')}</button>`:''}
      </div></div>`).join('');
  }
  $('#view').innerHTML = html;
}

async function claim(gigId, name){
  // ถ้ายังไม่ได้รับ จะ reserved ให้ (idempotent ฝั่ง server: ถ้าเป็นของเราอยู่แล้วก็ส่งรูปต่อได้)
  const { data, error } = await window.meRpc('gig_claim', { p_gig: gigId });
  if (error) { toast(error.message); return; }
  // server คืน ok ถ้าเป็นงานเราเอง (reserved/submitted) → ไปส่งรูปต่อ; already_taken = คนอื่นรับไปแล้ว
  if (data && data.error) { toast(msg(data.error)); load(); return; }
  uploadView(gigId, name);
}

function uploadView(gigId, name){
  pickedFile = null;
  $('#view').innerHTML = `
    <button class="back" onclick="load()">${NAV.t('← กลับกระดานงาน','← Back to gig board')}</button>
    <div class="sec">${NAV.t('ส่งรูป','Submit photo')} · ${name}</div>
    <div class="upload">
      <input id="file" type="file" accept="image/*" style="display:none" onchange="onPick(event)">
      <img id="prev">
      <p>${NAV.t('เลือกรูปชุดเต็มตัว ชัด แสงสวย','Choose a clear, well-lit full-length photo')}</p>
      <button class="btn ghost" onclick="document.getElementById('file').click()">${NAV.t('เลือกรูป','Choose photo')}</button>
      <button class="btn" id="go" disabled onclick="submitAndAudit('${gigId}','${(name||'').replace(/'/g,'')}')">${NAV.t('อัปรูป แล้วให้เราตรวจ','Upload and review')}</button>
    </div>
    <div id="auditResult"></div>`;
}

function onPick(e){
  pickedFile = e.target.files[0]; if (!pickedFile) return;
  const img = $('#prev'); img.src = URL.createObjectURL(pickedFile); img.style.display = 'block';
  $('#go').disabled = false;
}

async function submitAndAudit(gigId, name){
  if (!pickedFile) return;
  $('#go').disabled = true;
  $('#auditResult').innerHTML = `<div class="audit"><h4>${NAV.t('กำลังอัปโหลด…','Uploading…')}</h4></div>`;
  try {
    // 1) อัปรูปเข้า storage → public url
    const path = `ugc-${Date.now()}-${(pickedFile.name||'p').replace(/\s+/g,'_')}`;
    const up = await sb.storage.from('uploads').upload(path, pickedFile);
    if (up.error) throw new Error(NAV.t('อัปโหลดรูปไม่สำเร็จ','Photo upload failed'));
    const url = sb.storage.from('uploads').getPublicUrl(path).data.publicUrl;
    // 2) ผูกรูปกับงาน (สร้าง asset)
    const { data: sub, error: se } = await window.meRpc('ugc_submit', { p_gig: gigId, p_photo_url: url });
    if (se || (sub && sub.error)) throw new Error(msg(se ? se.message : sub.error));
    // 3) ให้ AI ตรวจ (auth ด้วย LINE idToken) — ผ่าน = จ่ายเครดิตอัตโนมัติฝั่ง server
    $('#auditResult').innerHTML = `<div class="audit"><h4>${NAV.t('กำลังให้ AI ตรวจ…','AI is reviewing…')}</h4></div>`;
    const idToken = (window.liff && liff.getIDToken) ? liff.getIDToken() : null;
    const r = await fetch(FN + '/ugc-audit', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id_token: idToken, asset_id: sub.asset_id }) });
    const a = await r.json();
    if (a.error) throw new Error(NAV.t('ตรวจรูปไม่สำเร็จ: ','Photo review failed: ') + a.error);
    showAudit(gigId, name, a);
  } catch (err) {
    $('#auditResult').innerHTML = `<div class="err">${err.message}</div>`;
    $('#go').disabled = false;
  }
}

function showAudit(gigId, name, a){
  const row = (label, ok) => `<div class="checkrow"><span class="${ok?'ok':'bad'}">${ok?'✓':'✕'}</span>${label}</div>`;
  // ugc-audit คืน audit เต็ม → โชว์ ✓/✕ รายข้อ
  const checks = [[NAV.t('เห็นชุดเต็มตัว','Full outfit visible'), a.dress_fully_visible], [NAV.t('ภาพชัด โฟกัสดี','Sharp and in focus'), a.in_focus],
    [NAV.t('แสงดี','Good lighting'), a.lighting_ok], [NAV.t('เหมาะสม (brand-safe)','Brand-safe'), a.brand_safe]];
  $('#auditResult').innerHTML = `
    <div class="audit">
      <h4>${a.pass ? NAV.t('ผ่าน! ชุดนี้เข้าคลังแล้ว','Approved! This look is now in the closet') : NAV.t('ยังไม่ผ่าน — ลองถ่าย/เลือกใหม่','Not approved — try another shot')}</h4>
      ${checks.map(([l,v]) => row(l, !!v)).join('')}
      ${(a.reasons&&a.reasons.length) ? `<div style="font-size:12px;color:var(--stone);margin-top:8px">${a.reasons.join(' · ')}</div>` : ''}
      ${a.pass
        ? `<p style="margin-top:10px;color:var(--ok)">${NAV.t('ได้เครดิตเข้ากระเป๋าแล้ว — ไว้ลดค่าเช่าครั้งหน้า','Credit added to your wallet — use it on your next rental')}</p>
           <button class="btn" onclick="load()" style="margin-top:10px">${NAV.t('กลับกระดานงาน','Back to gig board')}</button>`
        : `<button class="btn ghost" onclick="uploadView('${gigId}','${(name||'').replace(/'/g,'')}')" style="margin-top:10px">${NAV.t('ลองใหม่','Try again')}</button>`}
    </div>`;
}

window.addEventListener('lloop:lang', function(){ location.reload(); });
load();
</script>
</body>
</html>
