<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLOOP · ไลฟ์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="../liff/config.js"></script>
<script src="ops-api.js"></script>
<style>
  :root{--ink:#3B362C;--bg:#F2F1EE;--card:#fff;--line:#E0DED9;--muted:#86857F;--sage:#6E8A6A;--clay:#A75F3A;--soft:#F5F2EC;--sans:'Prompt',sans-serif;--display:'Poppins','Prompt',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:16px}
  .bar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .bar h1{font-family:var(--display);font-size:19px;font-weight:700;color:var(--clay)}
  .bar .nav a{font-size:14px;color:var(--muted);text-decoration:none;margin-left:14px}
  .bar .nav a.on{color:var(--ink);font-weight:700}
  .wrap{max-width:820px;margin:16px auto;padding:0 14px;display:flex;flex-direction:column;gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px}
  .card h2{font-family:var(--display);font-size:16px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .card h2 .hint{font-family:var(--sans);font-size:12px;font-weight:400;color:var(--muted)}
  .btn{border:none;border-radius:9px;padding:11px 16px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);background:var(--ink);color:#fff}
  .btn.sage{background:var(--sage)}.btn.clay{background:var(--clay)}
  .btn.ghost{background:var(--soft);color:var(--ink);border:1px solid var(--line)}
  .btn.sm{padding:8px 12px;font-size:13px}
  .btn:disabled{opacity:.55;cursor:default}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px}
  input[type=text],input[type=url],input[type=datetime-local],textarea{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:#fff}
  textarea{resize:vertical;min-height:64px;line-height:1.5}
  .field{margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:640px){.grid2{grid-template-columns:1fr}}
  .chk{display:inline-flex;align-items:center;gap:7px;font-size:14px;color:var(--ink);cursor:pointer;background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:8px 12px}
  .chk.on{background:#EAEFE8;border-color:var(--sage)}
  .chk input{width:auto}
  .plats{display:flex;flex-wrap:wrap;gap:8px}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:13px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .meta{font-size:13px;color:var(--muted);margin-top:3px}
  .tag{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--soft);color:var(--ink);white-space:nowrap}
  .tag.facebook{background:#E5ECF5;color:#3A5A86}.tag.tiktok{background:#EFE7F2;color:#6B4A78}
  .tag.instagram{background:#F7E7EC;color:#9C3F5E}.tag.line{background:#E6F2E6;color:#2E7D32}
  .tag.draft{background:#EFEDE8;color:var(--muted)}.tag.scheduled{background:#EAEFE8;color:var(--sage)}
  .tag.live{background:#F6E3DC;color:var(--clay);font-weight:700}.tag.ended{background:#EFEDE8;color:var(--muted)}
  .ht{font-size:12px;padding:3px 9px;border-radius:20px;background:#EAEFE8;color:var(--sage)}
  .selg{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .selg .g{display:flex;align-items:center;gap:8px;background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:6px 8px;font-size:13px}
  .selg .g img{width:34px;height:46px;object-fit:cover;border-radius:5px;background:#fff}
  .selg .g .sx{cursor:pointer;color:var(--muted);background:none;border:none;font-size:13px}
  .empty{color:var(--muted);padding:10px 0;font-size:15px}
  .loading{color:var(--muted);text-align:center;padding:24px}
  .notice{background:#F0ECE2;border:1px solid #E2D8BE;color:#7A6516;border-radius:9px;padding:11px 13px;font-size:14px;margin-top:10px;line-height:1.5}
  .err{color:var(--clay)}
  .res{font-size:13px;margin-top:8px;display:flex;flex-direction:column;gap:4px}
  .res .ok{color:#0F6E56}.res .no{color:var(--clay)}.res .man{color:var(--muted)}
  .overlay{position:fixed;inset:0;background:rgba(40,36,28,.45);display:none;align-items:flex-start;justify-content:center;padding:24px 14px;z-index:50;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:14px;max-width:560px;width:100%;padding:18px;max-height:88vh;overflow:auto}
  .modal h3{font-family:var(--display);font-size:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .modal .x{cursor:pointer;color:var(--muted);font-size:20px;background:none;border:none}
  .pickgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:10px}
  @media(max-width:640px){.pickgrid{grid-template-columns:repeat(2,1fr)}}
  .gcard{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:#fff;cursor:pointer}
  .gcard:hover{border-color:var(--clay)}
  .gcard .ph{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--soft);display:block}
  .gcard .gi{padding:7px 9px}
  .gcard .gn{font-size:12px;font-weight:600;line-height:1.3}
  .gcard .gc{font-size:11px;color:var(--muted)}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1}.toast.bad{background:var(--clay)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .linkfields{margin-top:8px;display:none}.linkfields.show{display:block}
</style>
<link rel="stylesheet" href="ops-ui.css">
<style>
  /* keep action buttons inline (override central .btn width:100%) */
  .card .btn{width:auto;margin-top:0}
  .selg .g .sx,.modal .x{width:auto;margin-top:0}
</style>
</head>
<body>
  <div class="bar">
    <h1>ไลฟ์</h1>
    <div class="nav">
      <a href="/today.html">งานวันนี้</a>
      <a href="/marketing.html">คอนเทนต์</a>
      <a href="/live.html" class="on">ไลฟ์</a>
      <a href="/influencers.html">อินฟลู</a>
      <a href="/analytics.html">รายงาน</a>
    </div>
  </div>

  <div class="wrap">
    <section class="phead">
      <div class="eyebrow">live selling</div>
      <h1>เปิดไลฟ์ ส่งชุดถึงทุกจอ</h1>
      <div class="sub">ตั้งไลฟ์ครั้งเดียว แล้วกระจายประกาศไปทุกช่อง — ให้ทุกชุดได้ออกไปเจอบ้านใหม่พร้อมกัน</div>
    </section>

    <!-- สร้าง/แก้ไขไลฟ์ -->
    <div class="card">
      <h2>ตั้งไลฟ์ <span class="hint">สร้างที่เดียว — กระจายทุกช่องตอนกดประกาศ</span></h2>
      <input type="hidden" id="fId">
      <div class="field"><label>ชื่อไลฟ์</label><input type="text" id="fTitle" placeholder="เช่น ไลฟ์ชุดออกงาน รอบค่ำ"></div>
      <div class="field"><label>แคปชันประกาศ (ใช้ได้ทุกช่อง)</label><textarea id="fCaption" placeholder="คืนนี้สามทุ่ม! ไลฟ์ปล่อยชุดออกงานตัวเด็ด พิมพ์โค้ดจองได้เลย..."></textarea></div>
      <div class="grid2">
        <div class="field"><label>รูปปก (URL)</label><input type="url" id="fCover" placeholder="https://..."></div>
        <div class="field"><label>เวลานัดไลฟ์ (ถ้ามี)</label><input type="datetime-local" id="fSched"></div>
      </div>
      <div class="field"><label>แฮชแท็ก (เว้นวรรค/คอมมา)</label><input type="text" id="fTags" placeholder="llooplive ชุดออกงาน เช่าชุด"></div>

      <div class="field">
        <label>กระจายไปช่องไหน</label>
        <div class="plats" id="fPlats">
          <label class="chk"><input type="checkbox" value="facebook" checked> Facebook</label>
          <label class="chk"><input type="checkbox" value="line" checked> LINE (broadcast)</label>
          <label class="chk"><input type="checkbox" value="tiktok"> TikTok</label>
          <label class="chk"><input type="checkbox" value="instagram"> Instagram</label>
        </div>
      </div>
      <div class="linkfields" id="linkFields">
        <div class="grid2">
          <div class="field" data-link="facebook"><label>ลิงก์ไลฟ์ Facebook</label><input type="url" id="lkFacebook" placeholder="https://facebook.com/..."></div>
          <div class="field" data-link="tiktok"><label>ลิงก์ไลฟ์ TikTok</label><input type="url" id="lkTiktok" placeholder="https://tiktok.com/@.../live"></div>
          <div class="field" data-link="instagram"><label>ลิงก์ไลฟ์ Instagram</label><input type="url" id="lkInstagram" placeholder="https://instagram.com/..."></div>
        </div>
      </div>

      <div class="field">
        <label>ชุดที่จะโชว์ในไลฟ์</label>
        <button class="btn ghost sm" onclick="openPicker()">+ เลือกชุด</button>
        <div class="selg" id="fSel"></div>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">
        <button class="btn" id="saveBtn" onclick="saveLive()">บันทึกไลฟ์</button>
        <button class="btn ghost" onclick="resetForm()">ล้างฟอร์ม</button>
      </div>
      <div id="formNote"></div>
    </div>

    <!-- รายการไลฟ์ -->
    <div class="card">
      <h2>ไลฟ์ทั้งหมด</h2>
      <div id="liveList"><div class="loading">กำลังโหลด...</div></div>
    </div>
  </div>

  <!-- modal เลือกชุด -->
  <div class="overlay" id="pickOverlay">
    <div class="modal">
      <h3>เลือกชุดโชว์ในไลฟ์ <button class="x" onclick="closePicker()">&times;</button></h3>
      <input type="text" id="pickQ" placeholder="ค้นหาชื่อ/โค้ด/แบรนด์..." oninput="debouncedPick()">
      <div class="pickgrid" id="pickGrid"><div class="loading">กำลังโหลด...</div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL='https://rprwilsbjptdnvsibjgi.supabase.co';
  const SUPABASE_KEY='sb_publishable_rhIE-GxNxBI-diEwLEJfZg_oAMGxhfa';
  const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  if(window.opsRpc) sb.rpc=window.opsRpc;            // วิ่งผ่าน gateway (LINE login + role)
  if(window.opsLogin) window.opsLogin().catch(()=>{});
  const BROADCAST_URL=SUPABASE_URL+'/functions/v1/live-broadcast';
  const $=id=>document.getElementById(id);
  const esc=s=>(s==null?'':String(s)).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  const dt=s=>s?new Date(s).toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
  const PLAT_TH={facebook:'Facebook',line:'LINE',tiktok:'TikTok',instagram:'Instagram'};
  function splitTags(str){ return (str||'').split(/[,\s]+/).map(s=>s.trim().replace(/^#/,'')).filter(Boolean); }
  function isoToLocal(s){ if(!s)return ''; const d=new Date(s); const p=n=>String(n).padStart(2,'0');
    return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }
  let TOAST_T=null;
  function toast(msg,bad){ const t=$('toast'); t.textContent=msg; t.className='toast show'+(bad?' bad':''); clearTimeout(TOAST_T); TOAST_T=setTimeout(()=>{t.className='toast';},3200); }

  let SELECTED=[];   // [{id,code,name,photo}]

  /* ---- platform link fields toggle ---- */
  function plats(){ return [...document.querySelectorAll('#fPlats input:checked')].map(c=>c.value); }
  function syncPlatUI(){
    const ps=plats();
    document.querySelectorAll('#fPlats .chk').forEach(l=>l.classList.toggle('on',l.querySelector('input').checked));
    const needLinks=ps.some(p=>p!=='line');
    $('linkFields').classList.toggle('show',needLinks);
    ['facebook','tiktok','instagram'].forEach(p=>{
      const f=document.querySelector('.linkfields [data-link="'+p+'"]');
      if(f) f.style.display=ps.includes(p)?'':'none';
    });
  }
  document.getElementById('fPlats').addEventListener('change',syncPlatUI);

  /* ---- garment picker ---- */
  let PICK_T=null;
  function debouncedPick(){ clearTimeout(PICK_T); PICK_T=setTimeout(loadPick,300); }
  function openPicker(){ $('pickOverlay').classList.add('show'); loadPick(); }
  function closePicker(){ $('pickOverlay').classList.remove('show'); }
  async function loadPick(){
    const q=$('pickQ').value.trim();
    $('pickGrid').innerHTML='<div class="loading">กำลังโหลด...</div>';
    const {data,error}=await sb.rpc('garments_pick',{p_q:q||null,p_limit:24});
    if(error){ $('pickGrid').innerHTML='<div class="empty err">โหลดไม่สำเร็จ</div>'; return; }
    const gs=data||[];
    if(!gs.length){ $('pickGrid').innerHTML='<div class="empty">ไม่พบชุด</div>'; return; }
    $('pickGrid').innerHTML=gs.map(g=>
      '<div class="gcard" onclick=\'pickGarment('+JSON.stringify({id:g.id,code:g.code,name:g.name,photo:g.photo})+')\'>'+
      '<img class="ph" src="'+esc(g.photo||'')+'" alt="">'+
      '<div class="gi"><div class="gn">'+esc(g.name||'(ไม่มีชื่อ)')+'</div><div class="gc">'+esc(g.code||'')+'</div></div></div>').join('');
  }
  function pickGarment(g){
    if(SELECTED.some(x=>x.id===g.id)){ toast('เลือกชุดนี้แล้ว'); return; }
    SELECTED.push(g); renderSel(); toast('เพิ่ม '+(g.name||g.code||'ชุด')+' แล้ว');
  }
  function removeSel(id){ SELECTED=SELECTED.filter(x=>x.id!==id); renderSel(); }
  function renderSel(){
    $('fSel').innerHTML=SELECTED.length?SELECTED.map(g=>
      '<div class="g"><img src="'+esc(g.photo||'')+'" alt=""><span>'+esc(g.name||g.code||'ชุด')+'</span>'+
      '<button class="sx" onclick="removeSel(\''+g.id+'\')">ลบ</button></div>').join('')
      :'<span class="empty">ยังไม่ได้เลือกชุด</span>';
  }

  /* ---- save ---- */
  function linksFromForm(){
    const o={}; ['facebook','tiktok','instagram'].forEach(p=>{
      const v=$('lk'+p.charAt(0).toUpperCase()+p.slice(1)).value.trim(); if(v) o[p]=v; });
    return o;
  }
  async function saveLive(){
    const title=$('fTitle').value.trim();
    if(!title){ toast('ใส่ชื่อไลฟ์ก่อนนะคะ',true); return; }
    const ps=plats();
    if(!ps.length){ toast('เลือกอย่างน้อย 1 ช่อง',true); return; }
    const payload={
      id:$('fId').value||undefined, title,
      caption:$('fCaption').value.trim()||null,
      cover_url:$('fCover').value.trim()||null,
      hashtags:splitTags($('fTags').value),
      platforms:ps, links:linksFromForm(),
      featured_garment_ids:SELECTED.map(g=>g.id),
      scheduled_at:$('fSched').value?new Date($('fSched').value).toISOString():null,
    };
    $('saveBtn').disabled=true; $('saveBtn').innerHTML='<span class="spin"></span>บันทึก...';
    const {data,error}=await sb.rpc('live_upsert',{p:payload});
    $('saveBtn').disabled=false; $('saveBtn').textContent='บันทึกไลฟ์';
    if(error){ toast('บันทึกไม่สำเร็จ: '+error.message,true); return; }
    toast('บันทึกไลฟ์แล้ว'); resetForm(); loadList();
  }
  function resetForm(){
    $('fId').value=''; $('fTitle').value=''; $('fCaption').value=''; $('fCover').value='';
    $('fSched').value=''; $('fTags').value=''; SELECTED=[]; renderSel();
    ['lkFacebook','lkTiktok','lkInstagram'].forEach(i=>$(i).value='');
    document.querySelectorAll('#fPlats input').forEach(c=>c.checked=(c.value==='facebook'||c.value==='line'));
    syncPlatUI();
  }
  function editLive(l){
    $('fId').value=l.id; $('fTitle').value=l.title||''; $('fCaption').value=l.caption||'';
    $('fCover').value=l.cover_url||''; $('fSched').value=isoToLocal(l.scheduled_at);
    $('fTags').value=(l.hashtags||[]).join(' ');
    document.querySelectorAll('#fPlats input').forEach(c=>c.checked=(l.platforms||[]).includes(c.value));
    const lk=l.links||{}; $('lkFacebook').value=lk.facebook||''; $('lkTiktok').value=lk.tiktok||''; $('lkInstagram').value=lk.instagram||'';
    SELECTED=(l.featured||[]).map(g=>({id:g.id,code:g.code,name:g.name,photo:g.photo})); renderSel();
    syncPlatUI(); window.scrollTo({top:0,behavior:'smooth'}); toast('แก้ไขไลฟ์นี้');
  }

  /* ---- announce / fan-out ---- */
  async function announce(id,btn){
    if(!confirm('ประกาศไลฟ์นี้ไปทุกช่องที่เลือกเลยไหม? (LINE จะ broadcast หา follower ทุกคน)')) return;
    btn.disabled=true; btn.innerHTML='<span class="spin"></span>กำลังกระจาย...';
    try{
      const res=await fetch(BROADCAST_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({live_id:id})});
      const j=await res.json().catch(()=>null);
      if(!res.ok||!j||j.error){ toast('กระจายไม่สำเร็จ: '+((j&&j.error)||('HTTP '+res.status)),true); }
      else toast('ประกาศไลฟ์แล้ว');
    }catch(e){ toast('เชื่อมต่อไม่สำเร็จ: '+e.message,true); }
    btn.disabled=false; loadList();
  }
  async function setStatus(id,status){
    if(status==='ended'&&!confirm('จบไลฟ์นี้?')) return;
    const {error}=await sb.rpc('live_set_status',{p_id:id,p_status:status});
    if(error){ toast('อัปเดตไม่สำเร็จ',true); return; }
    toast(status==='ended'?'จบไลฟ์แล้ว':'อัปเดตแล้ว'); loadList();
  }

  /* ---- render result ---- */
  function resultHtml(r){
    if(!r||!Object.keys(r).length) return '';
    const rows=Object.entries(r).map(([p,v])=>{
      const name=PLAT_TH[p]||p;
      if(v&&v.ok) return '<span class="ok">'+esc(name)+' — กระจายแล้ว'+(v.post_id?' (โพสต์ '+esc(v.post_id)+')':'')+'</span>';
      if(v&&v.skipped==='manual') return '<span class="man">'+esc(name)+' — เตรียมแคปชันให้แล้ว (กดแปะมือ)</span>';
      if(v&&v.skipped==='no_token') return '<span class="man">'+esc(name)+' — ยังไม่ได้ตั้ง token (ข้ามไปก่อน)</span>';
      return '<span class="no">'+esc(name)+' — ไม่สำเร็จ'+(v&&v.error?': '+esc(v.error):'')+'</span>';
    });
    return '<div class="res">'+rows.join('')+'</div>';
  }

  /* ---- list ---- */
  async function loadList(){
    const {data,error}=await sb.rpc('live_list',{p_status:null});
    if(error){ $('liveList').innerHTML='<div class="empty err">โหลดไม่สำเร็จ: '+esc(error.message)+'</div>'; return; }
    const ls=data||[];
    if(!ls.length){ $('liveList').innerHTML='<div class="empty">ยังไม่มีไลฟ์ — สร้างไลฟ์แรกด้านบนได้เลย</div>'; return; }
    $('liveList').innerHTML=ls.map(l=>{
      const platTags=(l.platforms||[]).map(p=>'<span class="tag '+p+'">'+esc(PLAT_TH[p]||p)+'</span>').join(' ');
      const ht=(l.hashtags||[]).map(h=>'<span class="ht">#'+esc(h)+'</span>').join(' ');
      const when=l.status==='live'?('ไลฟ์อยู่ · เริ่ม '+dt(l.started_at)):
                 l.scheduled_at?('นัด '+dt(l.scheduled_at)):('สร้าง '+dt(l.created_at));
      const feat=(l.featured||[]).length?(' · '+l.featured.length+' ชุด'):'';
      const canAnnounce=l.status!=='ended';
      const actions=[
        canAnnounce?'<button class="btn clay sm" onclick=\'announce("'+l.id+'",this)\'>'+(l.announced_at?'ประกาศซ้ำ':'ประกาศเดี๋ยวนี้')+'</button>':'',
        '<button class="btn ghost sm" onclick=\'editLive('+JSON.stringify(l).replace(/'/g,"&#39;")+')\'>แก้ไข</button>',
        l.status==='live'?'<button class="btn ghost sm" onclick=\'setStatus("'+l.id+'","ended")\'>จบไลฟ์</button>':''
      ].filter(Boolean).join(' ');
      return '<div class="row"><div style="flex:1;min-width:0">'+
        '<div style="font-weight:600;font-size:16px">'+esc(l.title)+' <span class="tag '+l.status+'">'+esc(l.status)+'</span></div>'+
        '<div class="meta">'+esc(when)+esc(feat)+'</div>'+
        '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;align-items:center">'+platTags+' '+ht+'</div>'+
        resultHtml(l.announce_result)+
        '<div style="margin-top:9px;display:flex;flex-wrap:wrap;gap:7px">'+actions+'</div>'+
      '</div></div>';
    }).join('');
  }

  resetForm(); loadList();
</script>
</body>
</html>
