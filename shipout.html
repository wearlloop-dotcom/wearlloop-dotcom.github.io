<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLOOP · เตรียมส่ง (สติ๊กเกอร์ + ถุงส่งกลับ)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1A1A1A;--line:#D9D7D2;--muted:#86857F;--soft:#F5F4F2;--danger:#A32D2D;--sans:'Prompt',sans-serif;--display:'Poppins','Prompt',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:#EEEDEA;font-size:15px}
.bar{background:#fff;border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.bar h1{font-family:var(--display);font-size:18px;font-weight:700}
.bar a{font-size:13px;color:var(--muted);text-decoration:none;margin-left:14px}
.tools{max-width:880px;margin:16px auto;padding:0 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.tools input{border:2px solid var(--line);border-radius:9px;padding:11px 14px;font-size:18px;text-transform:lowercase;font-family:var(--sans)}
.btn{border:none;border-radius:9px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);background:var(--ink);color:#fff}
.btn.print{background:#0F6E56}
.sheets{max-width:880px;margin:0 auto 40px;padding:0 14px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sticker{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px;break-inside:avoid}
.sticker.full{grid-column:1/3}
.sticker .k{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.gname{font-family:var(--display);font-size:20px;font-weight:600}
.qr{display:flex;justify-content:center;margin:10px 0}
.fragile{border:3px solid var(--danger);border-radius:12px;padding:16px;text-align:center}
.fragile .big{font-family:var(--display);font-size:26px;font-weight:700;color:var(--danger);letter-spacing:1px}
.fragile ul{list-style:none;margin-top:10px;font-size:15px;text-align:left;display:inline-block}
.fragile li{margin:4px 0}
.addr{display:flex;gap:14px}.addr>div{flex:1}
.box{border:1.5px solid var(--ink);border-radius:8px;padding:12px;min-height:104px}
.box .lab{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.box .nm{font-weight:600;margin-top:3px}.box .ad{font-size:14px;color:#333;margin-top:3px;white-space:pre-wrap}
.ret-note{background:#FDF2D6;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:12px}
.placeholder{color:var(--muted);text-align:center;padding:40px}
  @media print{
    body{background:#fff}.bar,.tools,.noprint{display:none!important}
.sheets{margin:0;padding:0;gap:8px}.sticker{border:1px dashed #999;page-break-inside:avoid}
  }
</style>
<link rel="stylesheet" href="ops-ui.css">
<style>
  /* override เฉพาะจุด: ปุ่มในแถวเครื่องมือต้อง width:auto ไม่เต็มบรรทัด */
  .tools .btn{width:auto}
  .phead{max-width:880px;margin:16px auto 0;padding:0 14px}
</style>
</head>
<body>
<div class="bar">
  <h1>เตรียมส่ง</h1>
  <div><a href="/laundry.html">ซัก/QC</a><a href="/labels.html">ป้ายQR</a><a href="/intake.html">รับเข้า</a></div>
</div>
<section class="phead noprint">
  <div class="eyebrow">pack · ship</div>
  <h1>ส่งความสวยถึงมือลูกค้า</h1>
  <div class="sub">พิมพ์ใบจ่าหน้า + ป้ายดูแล แพ็กให้ถูกช่อง ส่งให้ตรงเวลา</div>
</section>
<div class="tools noprint">
  <input id="code" placeholder="ใส่โค้ดชุด เช่น g1" autocomplete="off">
  <button class="btn" onclick="load()">เตรียม</button>
  <button class="btn print" onclick="window.print()"> ปริ้นทั้งหมด</button>
  <span id="hint" style="color:var(--muted);font-size:13px"></span>
</div>
<div class="sheets" id="sheets"><div class="placeholder">ใส่โค้ดชุดเพื่อสร้างสติ๊กเกอร์ + ใบส่งกลับ</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="../liff/config.js"></script>
<script src="ops-api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const SUPABASE_URL='https://rprwilsbjptdnvsibjgi.supabase.co';
  const SUPABASE_KEY='sb_publishable_rhIE-GxNxBI-diEwLEJfZg_oAMGxhfa';
  const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  if(window.opsRpc) sb.rpc=window.opsRpc;             // ทุก sb.rpc วิ่งผ่าน gateway (LINE login + role)
  if(window.opsLogin) window.opsLogin().catch(()=>{});  // ให้ staff ล็อกอิน LINE ตั้งแต่เปิดหน้า
  const $=id=>document.getElementById(id);
  const esc=s=>(s==null?'':String(s)).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
  function thdate(s){ return s?new Date(s).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'}):'—'; }

  async function load(){
    const code=$('code').value.trim().toLowerCase(); if(!code){ $('hint').textContent='ใส่โค้ดก่อนค่ะ'; return; }
    const { data, error } = await sb.rpc('shipout_info',{ p_code: code });
    if(error||!data||!data.garment){ $('sheets').innerHTML='<div class="placeholder" style="color:#A32D2D">ไม่พบชุด'+esc(code)+'</div>'; return; }
    render(code, data);
  }
  function render(code, d){
    const g=d.garment, c=d.customer, r=d.ret;
    const delicate = g.is_sheer || /ซาติน|silk|ไหม|ชีฟอง|ลูกไม้|lace/i.test(g.fabric||'');
    $('sheets').innerHTML=`
      <div class="sticker">
        <div class="k">ป้ายชุด</div>
        <div class="gname">${esc(g.name)}</div>
        <div style="color:var(--muted);font-size:13px">โค้ด ${esc(g.code)} · ${esc(g.category||'')}</div>
        ${g.bin?`<div style="margin-top:8px;font-size:15px"><b>หยิบจากช่อง:</b> <span style="font-family:var(--display);font-weight:700;font-size:20px;color:var(--ink)">${esc(g.bin)}</span></div>`:`<div style="margin-top:8px;font-size:13px;color:#A32D2D">ยังไม่ได้เก็บเข้าช่อง</div>`}
        <div class="qr" id="qrG"></div>
        <div style="text-align:center;font-size:12px;color:var(--muted)">สแกนดูชุด/ไทม์ไลน์</div>
      </div>

      <div class="sticker">
        <div class="k">สติ๊กเกอร์ระวังของ</div>
        <div class="fragile">
          <div class="big"> โปรดระวัง</div>
          <div style="font-weight:600;margin-top:2px">เสื้อผ้าให้เช่า บอบบาง</div>
          <ul>
            <li> ห้ามโยน / กดทับ / พับแรง</li>
            <li> กันน้ำ / กันเปื้อน</li>
            ${delicate?'<li> ผ้าบอบบางพิเศษ — ถนอมมาก</li>':''}
            <li> ${esc(g.wash)}</li>
          </ul>
        </div>
      </div>

      <div class="sticker full">
        <div class="k">ใบปะหน้าถุง — สำหรับส่งกลับ</div>
        <div class="addr">
          <div class="box">
            <div class="lab"> ผู้รับ (ส่งกลับมาที่)</div>
            <div class="nm">${esc(r.name)}</div>
            <div class="ad">${esc(r.address)}\nโทร ${esc(r.phone)}</div>
          </div>
          <div class="box">
            <div class="lab">ผู้ส่ง (ลูกค้า)</div>
            <div class="nm">${esc(c.name)}</div>
            <div class="ad">${c.address?esc(c.address):'________________________'}\nโทร ${c.phone?esc(c.phone):'____________'}</div>
          </div>
          <div style="text-align:center">
            <div id="qrR"></div>
            <div style="font-size:11px;color:var(--muted)">โค้ด ${esc(g.code)}</div>
          </div>
        </div>
        <div class="ret-note"> ถุงนี้สำหรับ <b>ส่งชุดกลับ LLOOP</b> — ใส่ชุดในถุงเดิม แปะใบนี้หน้าถุง แล้วส่งกลับภายในกำหนด ${d.due?'('+thdate(d.due)+')':''} · มีปัญหาแจ้งในแชต LINE ได้เลยค่ะ</div>
      </div>`;
    new QRCode($('qrG'),{text:'https://lloop.app/g/'+g.code,width:96,height:96});
    new QRCode($('qrR'),{text:'https://lloop.app/g/'+g.code,width:84,height:84});
    $('hint').textContent='พร้อมปริ้น — กด';
  }
  $('code').addEventListener('keydown',e=>{ if(e.key==='Enter') load(); });
</script>
</body>
</html>
