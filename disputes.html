<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLOOP · ทะเบียนคดี / ข้อพิพาท</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="config.js"></script>
<script src="ops-api.js"></script>
<style>
  :root{--ink:#1a1a1a;--line:#999;--muted:#666;--navy:#0C3A33;--red:#9a2b2b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;color:var(--ink);background:#eee;font-size:14px;padding:16px}
  .wrap{max-width:960px;margin:0 auto}
  h1{font-size:20px;letter-spacing:1px;margin-bottom:2px}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:14px}
  .card{background:#fff;border:1px solid #ccc;border-radius:6px;padding:16px 18px;margin-bottom:14px}
  .card h2{font-size:15px;border-left:4px solid var(--navy);padding-left:8px;margin-bottom:10px}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px}
  input,select,textarea{width:100%;padding:8px 9px;border:1px solid #bbb;border-radius:4px;font-family:inherit;font-size:14px}
  textarea{min-height:60px;resize:vertical}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 12px}
  button{padding:9px 16px;border:1px solid var(--navy);border-radius:4px;background:#fff;cursor:pointer;font-family:inherit;font-size:14px}
  button.p{background:var(--navy);color:#fff}
  button.sm{padding:5px 10px;font-size:12.5px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border:1px solid var(--line);padding:7px 8px;text-align:left;vertical-align:top}
  th{background:#f3f3f3;white-space:nowrap}
  tr.click{cursor:pointer}tr.click:hover{background:#f6f6f2}
  .badge{display:inline-block;font-size:11px;border:1px solid var(--navy);color:var(--navy);border-radius:20px;padding:1px 8px;white-space:nowrap}
  .badge.red{border-color:var(--red);color:var(--red)}
  .muted{color:var(--muted)}
  .hide{display:none}
  .kv{font-size:13px;line-height:1.9}.kv b{display:inline-block;min-width:120px;color:var(--muted)}
  .tl{border-left:2px solid #ddd;margin:6px 0 6px 6px;padding-left:12px}
  .tl .ev{margin-bottom:8px;font-size:13px}.tl .ev .t{color:var(--muted);font-size:11.5px}
  .letter{white-space:pre-wrap;font-size:14px;line-height:1.85;background:#fff;border:1px solid #ccc;border-radius:4px;padding:30px 34px;font-family:'Sarabun',serif}
  .snap{white-space:pre-wrap;font-size:11px;background:#fafafa;border:1px solid #eee;border-radius:4px;padding:10px;max-height:260px;overflow:auto}
  .imgs{display:flex;gap:10px;flex-wrap:wrap}.imgs img{max-height:150px;border:1px solid #ccc;border-radius:4px}
  .err{color:var(--red);font-size:13px;margin:6px 0}
  @media print{body{background:#fff;padding:0}.wrap>*:not(#printArea){display:none!important}#printArea{display:block!important}.letter{border:none;padding:0}}
</style>
</head>
<body>
<div class="wrap">
  <h1>LLOOP · ทะเบียนคดี / ข้อพิพาท</h1>
  <div class="sub">รวมศูนย์ทุกข้อพิพาท · ผูกหลักฐานอัตโนมัติ · ออกหนังสือทวงถามตามชนิดคดี · เฉพาะเจ้าของ/ผู้จัดการ (เข้าระบบด้วย LINE)</div>

  <!-- ========== เปิดคดีใหม่ ========== -->
  <div class="card">
    <h2>เปิดคดีใหม่</h2>
    <div class="grid">
      <div>
        <label>ชนิดข้อพิพาท</label>
        <select id="f_type">
          <option value="customer_no_return">ลูกค้าไม่คืนชุด (ยักยอก ม.352)</option>
          <option value="customer_damage">ลูกค้าทำชุดเสียหาย</option>
          <option value="customer_unpaid">ลูกค้าค้างชำระ</option>
          <option value="customer_fraud">ลูกค้าฉ้อโกง/สวมรอย (ม.341)</option>
          <option value="customer_claim">ลูกค้าเรียกร้อง (เราตั้งรับ)</option>
          <option value="influencer_no_return">อินฟลูไม่คืนชุดยืม</option>
          <option value="partner_breach">พาร์ทเนอร์ผิดสัญญา</option>
          <option value="partner_solicit">พาร์ทเนอร์ดึงลูกค้า/พนักงาน</option>
          <option value="seller_fake">ผู้ขายของปลอม/ไม่ตรงปก</option>
          <option value="employee_fraud">พนักงานทุจริต</option>
          <option value="labor_dispute">ข้อพิพาทแรงงาน</option>
          <option value="supplier_breach">ซัพพลายเออร์ผิดสัญญา</option>
          <option value="ip_violation">ละเมิดทรัพย์สินทางปัญญา</option>
          <option value="other">อื่น ๆ</option>
        </select>
      </div>
      <div>
        <label>เชื่อมโยงคู่กรณีในระบบ (ดึงชื่อ/บัตร/ที่อยู่อัตโนมัติ)</label>
        <div style="display:flex;gap:6px">
          <select id="f_ptype" style="flex:0 0 120px">
            <option value="">— ไม่เชื่อม —</option>
            <option value="customer">ลูกค้า</option>
            <option value="contract">สัญญาพาร์ทเนอร์</option>
            <option value="seller">ผู้ขายมือสอง</option>
            <option value="employee">พนักงาน</option>
            <option value="supplier">ซัพพลายเออร์</option>
            <option value="other">อื่น ๆ</option>
          </select>
          <input id="f_pref" placeholder="วาง ID (uuid)">
        </div>
      </div>
    </div>
    <div class="grid3">
      <div><label>ชื่อคู่กรณี</label><input id="f_name" placeholder="เว้นว่างถ้าเชื่อมจากระบบ"></div>
      <div><label>เลขบัตรประชาชน</label><input id="f_idc"></div>
      <div><label>ที่อยู่</label><input id="f_addr"></div>
    </div>
    <label>เรื่อง / หัวข้อ</label><input id="f_title" placeholder="เช่น เช่าชุดราตรีไม่ส่งคืน">
    <label>รายละเอียดข้อเท็จจริง (จะถูกอ้างในหนังสือทวงถาม)</label>
    <textarea id="f_desc" placeholder="เช่น เช่าชุด #D012 วันที่ 1 มิ.ย. ครบกำหนดคืน 5 มิ.ย. ติดต่อแล้วเพิกเฉย"></textarea>
    <div class="grid3">
      <div><label>มูลค่าเรียกร้อง (บาท)</label><input id="f_amount" type="number" value="0"></div>
      <div><label>ให้ปฏิบัติภายใน (วัน)</label><input id="f_days" type="number" value="7"></div>
      <div style="display:flex;align-items:flex-end"><button class="p" style="width:100%" onclick="openCase()">เปิดคดี</button></div>
    </div>
    <div class="err" id="f_err"></div>
  </div>

  <!-- ========== ทะเบียนคดี ========== -->
  <div class="card">
    <div class="toolbar">
      <h2 style="margin:0;flex:1">ทะเบียนคดี</h2>
      <select id="fl_status" onchange="loadList()" style="width:auto">
        <option value="">ทุกสถานะ</option>
        <option value="open">เปิด</option>
        <option value="notice_sent">ส่งหนังสือแล้ว</option>
        <option value="negotiating">เจรจา</option>
        <option value="police">แจ้งความ</option>
        <option value="court">ฟ้องศาล</option>
        <option value="settled">ตกลงได้</option>
        <option value="closed">ปิดคดี</option>
      </select>
      <button class="sm" onclick="loadList()">รีเฟรช</button>
    </div>
    <div id="listBox"><div class="muted" style="padding:20px;text-align:center">กด "รีเฟรช" เพื่อโหลด</div></div>
  </div>

  <!-- ========== รายละเอียดคดี ========== -->
  <div class="card hide" id="detailCard">
    <div class="toolbar">
      <h2 style="margin:0;flex:1" id="d_title">คดี</h2>
      <button class="sm" onclick="$('detailCard').classList.add('hide')">ปิด</button>
    </div>
    <div id="detailBox"></div>
  </div>
</div>

<!-- ========== พื้นที่พิมพ์หนังสือทวงถาม ========== -->
<div class="wrap hide" id="printArea">
  <div style="margin:0 auto;max-width:820px">
    <div class="toolbar" style="margin-bottom:10px"><button class="p sm" onclick="window.print()">พิมพ์ / PDF</button><button class="sm" onclick="$('printArea').classList.add('hide')">ปิด</button></div>
    <div class="letter" id="letterBox"></div>
  </div>
</div>

<script>
  const FN='https://rprwilsbjptdnvsibjgi.supabase.co/functions/v1/acct';
  const $=id=>document.getElementById(id);
  const esc=s=>(s==null||s==='')?'—':String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const dt=s=>s?new Date(s).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'}):'—';
  const baht=n=>n==null?'—':'฿'+Number(n).toLocaleString('th-TH');
  const TYPES={customer_no_return:'ลูกค้าไม่คืนชุด',customer_damage:'ลูกค้าทำชุดเสียหาย',customer_unpaid:'ลูกค้าค้างชำระ',customer_fraud:'ลูกค้าฉ้อโกง',customer_claim:'ลูกค้าเรียกร้อง',influencer_no_return:'อินฟลูไม่คืนชุด',partner_breach:'พาร์ทเนอร์ผิดสัญญา',partner_solicit:'พาร์ทเนอร์ดึงลูกค้า',seller_fake:'ผู้ขายของปลอม',employee_fraud:'พนักงานทุจริต',labor_dispute:'ข้อพิพาทแรงงาน',supplier_breach:'ซัพพลายเออร์ผิดสัญญา',ip_violation:'ละเมิด IP',other:'อื่น ๆ'};
  const STATUS={open:'เปิด',notice_sent:'ส่งหนังสือแล้ว',negotiating:'เจรจา',police:'แจ้งความ',court:'ฟ้องศาล',settled:'ตกลงได้',closed:'ปิดคดี'};

  async function api(action,extra){
    if(!(await window.opsLogin())) throw new Error('redirecting');
    const r=await fetch(FN,{method:'POST',headers:{'Authorization':'Bearer '+liff.getIDToken(),'Content-Type':'application/json'},body:JSON.stringify(Object.assign({action},extra))});
    if(r.status===401||r.status===403) throw new Error('ไม่มีสิทธิ์ (เฉพาะเจ้าของ/ผู้จัดการ)');
    const j=await r.json(); if(j.error) throw new Error(j.error); return j;
  }

  async function openCase(){
    $('f_err').textContent='';
    const d={dispute_type:$('f_type').value,party_type:$('f_ptype').value||null,party_ref:$('f_pref').value.trim()||null,
      party_name:$('f_name').value.trim(),party_id_card:$('f_idc').value.trim(),party_address:$('f_addr').value.trim(),
      title:$('f_title').value.trim(),description:$('f_desc').value.trim(),
      damage_amount:Number($('f_amount').value||0),demand_due_days:Number($('f_days').value||7)};
    try{ const r=await api('dispute_open',{dispute:d});
      ['f_pref','f_name','f_idc','f_addr','f_title','f_desc'].forEach(i=>$(i).value=''); $('f_amount').value=0;
      await loadList(); openDetail(r.id);
    }catch(e){ $('f_err').textContent=e.message; }
  }

  async function loadList(){
    $('listBox').innerHTML='<div class="muted" style="padding:16px;text-align:center">กำลังโหลด…</div>';
    try{ const r=await api('dispute_list',{status:$('fl_status').value||null}); renderList(r.rows||[]); }
    catch(e){ $('listBox').innerHTML='<div class="err">'+esc(e.message)+'</div>'; }
  }
  function renderList(rows){
    if(!rows.length){$('listBox').innerHTML='<div class="muted" style="padding:16px;text-align:center">— ไม่มีคดี —</div>';return;}
    $('listBox').innerHTML='<table><tr><th>เลขคดี</th><th>ชนิด</th><th>คู่กรณี</th><th>มูลค่า</th><th>สถานะ</th><th>เปิดเมื่อ</th></tr>'+
      rows.map(o=>`<tr class="click" onclick="openDetail('${o.id}')"><td>${esc(o.case_no)}</td><td>${esc(TYPES[o.dispute_type]||o.dispute_type)}</td><td>${esc(o.party_name)}</td><td>${baht(o.damage_amount)}</td><td><span class="badge ${['police','court'].includes(o.status)?'red':''}">${esc(STATUS[o.status]||o.status)}</span></td><td>${dt(o.created_at)}</td></tr>`).join('')+'</table>';
  }

  let CUR=null;
  async function openDetail(id){
    $('detailCard').classList.remove('hide'); $('detailBox').innerHTML='<div class="muted" style="padding:16px">กำลังรวบรวมคดี + หลักฐาน…</div>';
    $('detailCard').scrollIntoView({behavior:'smooth'});
    try{ const r=await api('dispute_get',{id}); CUR=r.case; renderDetail(r.case); }
    catch(e){ $('detailBox').innerHTML='<div class="err">'+esc(e.message)+'</div>'; }
  }
  function renderDetail(c){
    $('d_title').textContent=(c.case_no||'คดี')+' · '+(TYPES[c.dispute_type]||c.dispute_type);
    const ev=c.evidence;
    $('detailBox').innerHTML=`
      <div class="kv"><b>คู่กรณี:</b> ${esc(c.party_name)} ${c.party_id_card?'· บัตร '+esc(c.party_id_card):''}</div>
      <div class="kv"><b>ที่อยู่:</b> ${esc(c.party_address)}</div>
      <div class="kv"><b>เรื่อง:</b> ${esc(c.title)}</div>
      <div class="kv"><b>รายละเอียด:</b> ${esc(c.description)}</div>
      <div class="kv"><b>มูลค่าเรียกร้อง:</b> ${baht(c.damage_amount)} · <b style="min-width:auto">สถานะ:</b> <span class="badge">${esc(STATUS[c.status]||c.status)}</span></div>
      <div class="kv"><b>ส่งหนังสือเมื่อ:</b> ${dt(c.demand_sent_at)} · <b style="min-width:auto">แจ้งความ:</b> ${esc(c.police_report_no)} · <b style="min-width:auto">คดีศาล:</b> ${esc(c.court_case_no)}</div>

      <div class="toolbar" style="margin-top:12px">
        <button class="p sm" onclick="genLetter()">สร้างหนังสือทวงถาม</button>
        <button class="sm" onclick="markDemandSent()">บันทึก: ส่งหนังสือแล้ว</button>
      </div>

      <h2 style="margin-top:14px">บันทึกความเคลื่อนไหว</h2>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <select id="ev_kind" style="flex:0 0 150px"><option value="note">บันทึก</option><option value="reply">คู่กรณีตอบกลับ</option><option value="demand_sent">ส่งหนังสือทวงถาม</option><option value="police">แจ้งความ</option><option value="court">ยื่นฟ้อง</option><option value="settled">ตกลงได้</option></select>
        <input id="ev_detail" placeholder="รายละเอียด"><button class="sm" onclick="addEvent()">เพิ่ม</button>
      </div>
      <div class="tl">${(c.events||[]).length?c.events.map(e=>`<div class="ev"><b>${esc(e.kind)}</b> — ${esc(e.detail)}<div class="t">${dt(e.event_at)}</div></div>`).join(''):'<div class="muted">— ยังไม่มี —</div>'}</div>

      <h2 style="margin-top:14px">อัปเดตสถานะ / เลขคดี</h2>
      <div class="grid3">
        <div><label>สถานะ</label><select id="u_status">${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${k===c.status?'selected':''}>${v}</option>`).join('')}</select></div>
        <div><label>เลขรับแจ้งความ</label><input id="u_police" value="${esc(c.police_report_no)==='—'?'':esc(c.police_report_no)}"></div>
        <div><label>เลขคดีศาล</label><input id="u_court" value="${esc(c.court_case_no)==='—'?'':esc(c.court_case_no)}"></div>
      </div>
      <div style="margin-top:8px"><button class="sm" onclick="saveUpdate()">บันทึกสถานะ</button></div>

      <h2 style="margin-top:16px">หลักฐานที่ระบบรวบรวม (แฟ้มคดี)</h2>
      ${ev?renderEvidence(ev):'<div class="muted">— ไม่มีคู่กรณีเชื่อมโยง หรือไม่มีหลักฐานอัตโนมัติ —</div>'}
    `;
  }

  function imgs(files){return !files||!files.length?'':'<div class="imgs">'+files.map(f=>f.url?`<div><img src="${f.url}"><div class="muted" style="font-size:11px">${esc(f.kind)}</div></div>`:`<div class="muted">${esc(f.kind)} (ลิงก์หมดอายุ)</div>`).join('')+'</div>';}
  function qcPhotos(ph){
    if(!ph||!ph.length) return '<div class="muted">— ยังไม่มีรูป QC ก่อน/หลัง —</div>';
    const grp={}; ph.forEach(p=>{const k=esc(p.garment)+' · เช่า '+String(p.rental_id||'').slice(0,8); (grp[k]=grp[k]||[]).push(p);});
    return Object.entries(grp).map(([k,arr])=>{
      const col=(label,list)=>`<div style="flex:1"><div class="muted" style="font-size:12px;margin-bottom:3px">${label}</div>`+
        (list.length?'<div class="imgs">'+list.map(p=>`<div><img src="${p.url||''}"><div class="muted" style="font-size:11px">${esc(p.note)} · ${dt(p.created_at)}</div></div>`).join('')+'</div>':'<div class="muted">— ไม่มี —</div>')+'</div>';
      return `<div style="margin-bottom:10px"><div style="font-weight:700;font-size:12.5px">${k}</div><div style="display:flex;gap:14px">${col('ก่อนส่ง',arr.filter(p=>p.phase==='before'))}${col('ตอนรับคืน',arr.filter(p=>p.phase==='after'))}</div></div>`;
    }).join('');
  }
  function tbl(arr,cols){return !arr||!arr.length?'<div class="muted">— ไม่มี —</div>':`<table><tr>${cols.map(c=>`<th>${c[0]}</th>`).join('')}</tr>${arr.map(o=>`<tr>${cols.map(c=>`<td>${c[1](o)}</td>`).join('')}</tr>`).join('')}</table>`;}
  function renderEvidence(ev){
    if(ev.error) return '<div class="muted">หลักฐาน: '+esc(ev.error)+'</div>';
    if(ev.type==='customer'){const id=ev.identity||{};return `
      <div class="kv"><b>ตัวตน:</b> ${esc(id.display_name)} · บัตร ${esc(id.id_card)} ${id.kyc_verified?'<span class="badge">KYC แล้ว</span>':'<span class="badge red">ยังไม่ KYC</span>'}</div>
      ${imgs(ev.kyc_files)}
      <div style="margin-top:6px"><b class="muted">การยอมรับสัญญาเช่า:</b></div>${tbl(ev.terms_accepted,[['เวอร์ชัน',o=>esc(o.version)],['ยอมรับเมื่อ',o=>dt(o.accepted_at)],['IP',o=>esc(o.ip)]])}
      <div style="margin-top:6px"><b class="muted">การเช่า:</b></div>${tbl(ev.rentals,[['ชุด',o=>esc(o.garment)+' '+esc(o.name)],['สถานะ',o=>esc(o.status)],['กำหนดคืน',o=>dt(o.due_at)],['คืนเมื่อ',o=>o.returned_at?dt(o.returned_at):'<b>ยังไม่คืน</b>'],['ค่าเช่า',o=>baht(o.price)]])}
      <div style="margin-top:6px"><b class="muted">รูปสภาพชุด ก่อน-หลัง:</b></div>${qcPhotos(ev.qc_photos)}
      <div style="margin-top:6px"><b class="muted">การชำระ:</b></div>${tbl(ev.payments,[['ยอด',o=>baht(o.amount)],['ประเภท',o=>esc(o.purpose)],['เมื่อ',o=>dt(o.at)]])}
      <div style="margin-top:6px"><b class="muted">ความยินยอม PDPA:</b></div>${tbl(ev.consents,[['วัตถุประสงค์',o=>esc(o.purpose)],['เมื่อ',o=>dt(o.granted_at)]])}`;}
    if(ev.type==='contract'){const a=ev.esign_audit||{};return `
      <div class="kv"><b>ผู้ลงนาม:</b> ${esc(a.signer_name)} · บัตร ${esc(a.signer_id_card)}</div>
      <div class="kv"><b>ลงนามเมื่อ:</b> ${dt(a.signed_at)} · IP ${esc(a.signed_ip)}</div>
      <div class="kv"><b>ลายเซ็น:</b> ${a.has_signature?'มี':'—'}</div>
      <div style="margin-top:6px"><b class="muted">ข้อความสัญญา ณ เวลาลงนาม:</b></div><div class="snap">${esc(a.document_snapshot)}</div>`;}
    if(ev.type==='seller'){const a=ev.acquisition||{};return `
      <div class="kv"><b>ผู้ขาย:</b> ${esc(a.seller_name)} · บัตร ${esc(a.seller_id_card)}</div>
      <div class="kv"><b>ใบรับซื้อ:</b> ${esc(a.voucher_no)} · ${esc(a.name)} · ${baht(a.offered_price||a.asking_price)}</div>
      ${imgs(ev.kyc_files)}`;}
    return '<div class="snap">'+esc(JSON.stringify(ev,null,2))+'</div>';
  }

  async function addEvent(){
    try{ await api('dispute_event',{event:{case_id:CUR.id,kind:$('ev_kind').value,detail:$('ev_detail').value.trim()}}); openDetail(CUR.id); loadList(); }
    catch(e){ alert(e.message); }
  }
  async function markDemandSent(){
    try{ await api('dispute_event',{event:{case_id:CUR.id,kind:'demand_sent',detail:'ส่งหนังสือทวงถาม'}}); openDetail(CUR.id); loadList(); }
    catch(e){ alert(e.message); }
  }
  async function saveUpdate(){
    try{ await api('dispute_update',{update:{id:CUR.id,status:$('u_status').value,police_report_no:$('u_police').value.trim(),court_case_no:$('u_court').value.trim()}}); openDetail(CUR.id); loadList(); }
    catch(e){ alert(e.message); }
  }
  async function genLetter(){
    try{ const r=await api('demand_letter',{id:CUR.id}); const L=r.letter;
      if(!L||L.error){alert('สร้างไม่สำเร็จ: '+(L&&L.error));return;}
      $('letterBox').textContent=L.body; $('printArea').classList.remove('hide'); $('printArea').scrollIntoView({behavior:'smooth'});
    }catch(e){ alert(e.message); }
  }
</script>
