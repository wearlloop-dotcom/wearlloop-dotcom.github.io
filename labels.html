<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLOOP · ป้าย QR ชุด (ปริ้นแปะถุง)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1A1A1A;--line:#E0DED9;--muted:#86857F;--sans:'Inter','Prompt',sans-serif;--display:'Poppins','Prompt',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:#F2F1EE;font-size:14px}
.bar{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.bar h1{font-family:var(--display);font-size:18px;font-weight:700}
.bar .sub{font-size:12px;color:var(--muted)}
.bar button{background:var(--ink);color:#fff;border:none;padding:10px 20px;font-size:13px;cursor:pointer;border-radius:2px}
.sheet{max-width:900px;margin:18px auto;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px}
.label{background:#fff;border:1px solid var(--line);border-radius:6px;display:flex;overflow:hidden;page-break-inside:avoid}
.label .pic{width:120px;flex:none;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,.25);font-size:11px;text-align:center;padding:6px;font-family:var(--display);font-weight:600}
.label .pic img{width:100%;height:100%;object-fit:cover}
.label .info{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:3px}
.label .code{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:1px}
.label .nm{font-size:13px;font-weight:500;line-height:1.3}
.label .br{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.label .meta{font-size:11px;color:var(--muted);margin-top:2px}
.label .qr{margin-top:auto;display:flex;align-items:center;gap:8px}
.label .qr canvas,.label .qr img{width:74px;height:74px}
.label .qr .hint{font-size:9px;color:var(--muted)}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px}
  @media print{
.bar{display:none} body{background:#fff}
.sheet{margin:0;gap:8px;max-width:none;padding:6px}
.label{border:1px dashed #bbb}
  }
</style>
<link rel="stylesheet" href="ops-ui.css">
<style>
  .phead{max-width:900px;margin:18px auto 0;padding:0 14px}
  @media print{ .phead{display:none} }
</style>
</head>
<body>
<div class="bar">
  <div><h1>ป้าย QR ชุด</h1><div class="sub">ปริ้นแล้วตัดแปะที่ชุด / หน้าถุง — สแกน QR เพื่อดู/เช็คชุด · <a href="/care-label.html" style="color:#A75F3A">ป้ายเย็บติดชุด ></a></div></div>
  <button onclick="window.print()"> ปริ้นทั้งหมด</button>
</div>
<section class="phead" id="phead">
  <div class="eyebrow">qr label printing</div>
  <h1>ป้ายเล็ก ๆ ที่พาทุกชุดกลับบ้าน</h1>
  <div class="sub">ปริ้นป้าย QR แปะถุง สแกนทีเดียวเห็นที่มา-ไซซ์-สถานะของชุด ให้ทุกตัวกลับเข้า loop ได้อย่างไม่หลงทาง</div>
</section>
<div class="sheet" id="sheet"><div class="empty">กำลังโหลดชุดจากฐานข้อมูล…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="config.js"></script>
<script src="ops-api.js"></script>
<script>
  // === ตั้งค่า (publishable key ปลอดภัยที่จะฝัง) ===
  const SUPABASE_URL='https://rprwilsbjptdnvsibjgi.supabase.co';
  const SUPABASE_KEY='sb_publishable_rhIE-GxNxBI-diEwLEJfZg_oAMGxhfa';
  const QR_BASE='https://lloop.app/g/'; // QR เข้ารหัสเป็นลิงก์ตามด้วย code ของชุด (เปลี่ยนเป็นโดเมนจริงทีหลัง)

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  if(window.opsRpc) sb.rpc=window.opsRpc;            // R-4: RPC ผ่าน gateway (LINE idToken + role)
  if(window.opsLogin) window.opsLogin().catch(()=>{});
  (async function(){
    const { data, error } = await sb.rpc('ops_garments');
    const sheet = document.getElementById('sheet');
    if (error ||!data ||!data.length){ sheet.innerHTML =`<div class="empty">โหลดไม่ได้: ${error?error.message:'ไม่มีข้อมูล'}</div>`; return; }
    sheet.innerHTML = data.map(g=>{
      const photo = (g.photos&&g.photos[0])?`<img src="${g.photos[0]}">`: g.name;
      const bust = g.bust_min_in?`อก ${g.bust_min_in}-${g.bust_max_in}"`:'';
      const occ = (g.occasion_tags||[]).slice(0,3).join(' · ');
      return`<div class="label">
        <div class="pic" style="background:${g.color_hex||'#EDEAE4'}">${photo}</div>
        <div class="info">
          <div class="br">${g.brand||''}</div>
          <div class="code">${g.code}</div>
          <div class="nm">${g.name}</div>
          <div class="meta">${g.tier||''} · ${g.color_name||''}<br>${bust}<br>${occ}</div>
          <div class="qr"><div id="qr_${g.code}"></div><span class="hint">สแกนดูชุด</span></div>
        </div>
      </div>`;
    }).join('');
    data.forEach(g=>{ new QRCode(document.getElementById('qr_'+g.code), { text: QR_BASE+g.code, width:74, height:74, correctLevel: QRCode.CorrectLevel.M }); });
  })();
</script>
<script src="ops-menu.js"></script>
<script>window.opsMenu&&window.opsMenu.mount();</script>
</body>
</html>
